name: Build Release Zip

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create zip
        run: |
          zip -r crispy-critters.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "crispy-critters.zip"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: crispy-critters.zip
